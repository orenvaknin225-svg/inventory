<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ניהול מלאי</title>
  <style>
    body { font-family: Arial; max-width: 550px; margin: 30px auto; padding: 15px; background:#f5f5f5; }
    .box { background:white; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    input, button { width:100%; padding:12px; margin-top:10px; box-sizing:border-box; }
    button { background:#222; color:white; border:none; border-radius:8px; cursor:pointer; }
    .msg { background:#fff3cd; padding:10px; border-radius:8px; margin-bottom:15px; }
  </style>
</head>
<body>
  <h1>מערכת ניהול מלאי</h1>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for message in messages %}
        <div class="msg">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="box">
    <h2>כניסת מנהל</h2>
    <form method="POST" action="/login/admin">
      <input name="username" placeholder="שם משתמש מנהל" required>
      <input name="password" type="password" placeholder="סיסמת מנהל" required>
      <button type="submit">כניסת מנהל</button>
    </form>
  </div>

  <div class="box">
    <h2>כניסת עובד</h2>
    <form method="POST" action="/login/employee">
      <input name="username" placeholder="שם משתמש עובד" required>
      <input name="password" type="password" placeholder="סיסמת עובד" required>
      <button type="submit">כניסת עובד</button>
    </form>
  </div>
</body>
</html>
