<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>הוספת חלק חדש</title>
  <style>
    body { font-family: Arial; max-width: 650px; margin: 30px auto; padding: 15px; background:#f5f5f5; }
    .box { background:white; padding:20px; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    input, button { width:100%; padding:12px; margin-top:10px; box-sizing:border-box; }
    button { background:#222; color:white; border:none; border-radius:8px; cursor:pointer; }
    .back { display:inline-block; margin-bottom:15px; }
  </style>
</head>
<body>
  <a class="back" href="/parts">חזרה לרשימת חלקים</a>

  <div class="box">
    <h1>הוספת חלק חדש</h1>
    <form method="POST">
      <input name="name" placeholder="שם החלק" required>
      <input name="sku" placeholder="מק״ט" required>
      <input name="price" type="number" step="0.01" placeholder="מחיר" required>
      <input name="supplier" placeholder="ספק" required>
      <input name="stock" type="number" placeholder="מלאי התחלתי" required>
      <button type="submit">שמור חלק</button>
    </form>
  </div>
</body>
</html>
